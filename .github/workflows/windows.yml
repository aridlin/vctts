name: Build (Windows)

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch extern dependencies
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://filebin.net/m4gipplj7btweg6c/extern.zip" -OutFile "extern.zip"
          Expand-Archive -Path "extern.zip" -DestinationPath "."

      - name: Configure CMake
        run: >
          cmake -S . -B build
          -G "Visual Studio 17 2022"
          -A x64
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }}
